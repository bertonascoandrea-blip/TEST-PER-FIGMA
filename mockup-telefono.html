<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oway — Mockup Telefono</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(99,102,241,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 50%, rgba(168,85,247,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Phone shell */
  .phone {
    position: relative;
    width: 375px;
    height: 780px;
    background: #1a1a1a;
    border-radius: 54px;
    box-shadow:
      0 0 0 1.5px #333,
      0 0 0 3px #111,
      0 40px 120px rgba(0,0,0,0.8),
      0 0 60px rgba(99,102,241,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Side buttons */
  .phone::before {
    content: '';
    position: absolute;
    left: -4px;
    top: 140px;
    width: 4px;
    height: 36px;
    background: #2a2a2a;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 52px 0 #2a2a2a, 0 104px 0 #2a2a2a;
  }
  .phone::after {
    content: '';
    position: absolute;
    right: -4px;
    top: 180px;
    width: 4px;
    height: 64px;
    background: #2a2a2a;
    border-radius: 0 3px 3px 0;
  }

  /* Screen area */
  .screen {
    position: absolute;
    inset: 10px;
    border-radius: 46px;
    overflow: hidden;
    background: #000;
  }

  /* Notch / Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #0a0a0a;
    border-radius: 20px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .island-camera {
    width: 12px;
    height: 12px;
    background: #1a1a1a;
    border-radius: 50%;
    border: 1.5px solid #222;
    position: relative;
  }
  .island-camera::after {
    content: '';
    position: absolute;
    inset: 3px;
    background: #0d47a1;
    border-radius: 50%;
    opacity: 0.6;
  }

  /* Status bar */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    z-index: 9;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    pointer-events: none;
  }

  .status-time {
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-icons svg {
    fill: #fff;
  }

  /* iFrame */
  iframe {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    height: calc(100% - 60px);
    border: none;
    border-radius: 0 0 46px 46px;
  }

  /* Home bar */
  .home-bar {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    z-index: 10;
    pointer-events: none;
  }

  /* Label sotto */
  .label {
    position: absolute;
    bottom: -52px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.25);
    font-size: 12px;
    letter-spacing: 0.1em;
    white-space: nowrap;
    font-weight: 300;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="phone">
    <div class="screen">
      <div class="dynamic-island">
        <div class="island-camera"></div>
      </div>

      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <!-- Signal -->
          <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.3"/></svg>
          <!-- Wifi -->
          <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 9.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm0-4a5.5 5.5 0 014.243 1.757l-1.415 1.415A3.5 3.5 0 008 7.5a3.5 3.5 0 00-2.828 1.172L3.757 7.257A5.5 5.5 0 018 5.5zm0-4a9.5 9.5 0 017.07 3.101L13.657 6.01A7.5 7.5 0 008 3.5a7.5 7.5 0 00-5.657 2.51L.93 4.601A9.5 9.5 0 018 1.5z" opacity="0.9"/></svg>
          <!-- Battery -->
          <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2.5" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="1.5" y="2.5" width="17" height="7" rx="1.5" fill="white"/><path d="M22.5 4v4a2 2 0 000-4z" fill="white" opacity="0.4"/></svg>
        </div>
      </div>

      <iframe
        src="https://bertonascoandrea-blip.github.io/oway-test-3/"
        title="Oway website"
        loading="eager"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"
      ></iframe>

      <div class="home-bar"></div>
    </div>
  </div>
  <div class="label">oway-test-3 · github.io</div>
</div>
</body>
</html>
